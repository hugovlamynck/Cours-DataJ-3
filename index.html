<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte de l'Inclusion Numérique - Bordeaux</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; height: 100%; font-family: sans-serif; }
        #map { width: 100%; height: 100vh; }
        .popup-title { color: #2c3e50; border-bottom: 2px solid #e74c3c; padding-bottom: 5px; margin-top: 0; }
        .popup-info { margin: 5px 0; font-size: 13px; }
        .popup-services { background: #f9f9f9; padding: 8px; border-radius: 4px; margin: 10px 0; font-size: 12px; max-height: 100px; overflow-y: auto; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // Initialisation de la carte
    const map = L.map('map').setView([44.837789, -0.57918], 13);

    // Fond de carte élégant
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; OpenStreetMap contributors &copy; CARTO'
    }).addTo(map);

    // Chargement des données nettoyées
    Papa.parse('data_clean.csv', {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            console.log("Données chargées :", results.data.length);
            
            results.data.forEach(row => {
                const lat = parseFloat(row.latitude);
                const lon = parseFloat(row.longitude);

                if (!isNaN(lat) && !isNaN(lon)) {
                    const marker = L.marker([lat, lon]).addTo(map);
                    
                    // Tooltip au survol
                    marker.bindTooltip(`<b>${row.nom}</b><br><small>${row.type_lieu}</small>`, {
                        sticky: true,
                        direction: 'top'
                    });

                    // Popup au clic
                    marker.bindPopup(`
                        <div style="width: 280px;">
                            <h3 class="popup-title">${row.nom}</h3>
                            <p class="popup-info"><strong>📍 Adresse :</strong> ${row.adresse_brut}</p>
                            <p class="popup-info"><strong>🏢 Type :</strong> ${row.type_lieu}</p>
                            <div class="popup-services">
                                <strong>🛠 Services :</strong><br>${row.services || 'Non spécifiés'}
                            </div>
                            <p class="popup-info"><strong>👥 Public :</strong> ${row.public_cible}</p>
                            <p class="popup-info"><strong>⏰ Horaires :</strong> ${row.horaires_ouverture_brut || 'Non communiqués'}</p>
                            <p class="popup-info" style="color: #7f8c8d; font-style: italic; font-size: 11px; margin-top: 10px;">
                                ${row.description ? row.description.substring(0, 150) + '...' : ''}
                            </p>
                        </div>
                    `);
                }
            });
        }
    });
</script>

</body>
</html>
