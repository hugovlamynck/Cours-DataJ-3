<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des lieux d'inclusion numérique - Bordeaux</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // Initialisation de la carte centrée sur Bordeaux
    const map = L.map('map').setView([44.837789, -0.57918], 13);

    // Utilisation des tuiles CartoDB Positron (Alternative à OSM)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // Lecture du fichier CSV
    const csvFilePath = 'data.csv';

    Papa.parse(csvFilePath, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            console.log("Données chargées :", data.length, "lieux trouvés.");
            
            data.forEach((row, index) => {
                // Tentative d'extraction des coordonnées (plusieurs colonnes possibles)
                let lat = parseFloat(row.latitude);
                let lon = parseFloat(row.longitude);
                
                // Si lat/lon sont vides ou invalides, on cherche dans d'autres formats possibles
                if (isNaN(lat) || isNaN(lon)) {
                    if (row.geo_point) {
                        const parts = row.geo_point.split(',');
                        lat = parseFloat(parts[0]);
                        lon = parseFloat(parts[1]);
                    }
                }

                const name = row.nom || "Lieu sans nom";
                const description = row.description || "Pas de description disponible.";
                const adresse = row.adresse_brut || row.adresse_rue || "Adresse non spécifiée";
                const type = row.type_lieu || "Non spécifié";
                const public = row.public_cible || "Tout public";
                const contact = row.contact_telephone || row.contact_email || "N/A";
                const servicesRaw = row.services || "";
                const levelRaw = row.niveau_service || "";

                // Décodage des "codes" de services
                // On transforme "TABLETTE/Expert,ORDI/Basique" en une liste propre
                const formatCodes = (raw) => {
                    if (!raw) return "Non spécifié";
                    return raw.split(',')
                        .map(s => s.trim())
                        .filter(s => !s.endsWith('/Non')) // On enlève les services non disponibles
                        .map(s => s.replace('/', ' : ')) // On remplace le slash par " : "
                        .join('<br>');
                };

                const servicesClean = formatCodes(levelRaw || servicesRaw);

                if (!isNaN(lat) && !isNaN(lon)) {
                    const marker = L.marker([lat, lon]).addTo(map);

                    // Information au survol (Tooltip)
                    marker.bindTooltip(`<b>${name}</b><br><small>${type}</small>`, {
                        sticky: true,
                        direction: 'top'
                    });

                    // Information détaillée au clic (Popup)
                    marker.bindPopup(`
                        <div style="max-width: 320px; font-family: sans-serif; font-size: 13px;">
                            <h3 style="margin: 0 0 10px 0; color: #2c3e50; border-bottom: 2px solid #e74c3c; padding-bottom: 5px;">${name}</h3>
                            <p style="margin: 5px 0;"><strong>📍 Adresse :</strong> ${adresse}</p>
                            <p style="margin: 5px 0;"><strong>🏢 Type :</strong> ${type}</p>
                            <div style="background: #f9f9f9; padding: 10px; border-radius: 5px; margin: 10px 0;">
                                <strong>🛠 Compétences & Services :</strong><br>
                                <div style="max-height: 150px; overflow-y: auto; margin-top: 5px;">
                                    ${servicesClean}
                                </div>
                            </div>
                            <p style="margin: 5px 0;"><strong>👥 Public :</strong> ${public}</p>
                            <p style="margin: 5px 0;"><strong>⏰ Horaires :</strong> ${horaires}</p>
                            <p style="margin: 10px 0; font-size: 0.9em; line-height: 1.4; color: #7f8c8d;">${description.substring(0, 200)}...</p>
                            <p style="margin: 5px 0; border-top: 1px solid #eee; padding-top: 10px;"><strong>📞 Contact :</strong> ${contact}</p>
                        </div>
                    `);                } else {
                    console.warn(`Coordonnées invalides pour la ligne ${index + 1} : ${name}`);
                }
            });
        },
        error: function(err) {
            console.error("Erreur lors du chargement du CSV :", err);
        }
    });
</script>

</body>
</html>
