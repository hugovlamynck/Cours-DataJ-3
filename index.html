<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Carte des lieux d'inclusion numérique - Bordeaux</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        body, html { margin: 0; height: 100%; }
        #map { width: 100%; height: 100vh; }
    </style>
</head>
<body>

<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.3.2/papaparse.min.js"></script>

<script>
    // Initialisation de la carte centrée sur Bordeaux
    const map = L.map('map').setView([44.837789, -0.57918], 13);

    // Utilisation des tuiles CartoDB Positron (Alternative à OSM)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OpenStreetMap</a> contributors &copy; <a href="https://carto.com/attributions">CARTO</a>',
        subdomains: 'abcd',
        maxZoom: 20
    }).addTo(map);

    // Lecture du fichier CSV
    const csvFilePath = 'RAW_met_lieux_inclusion_numerique - RAW_met_lieux_inclusion_numerique.csv';

    Papa.parse(csvFilePath, {
        download: true,
        header: true,
        skipEmptyLines: true,
        complete: function(results) {
            const data = results.data;
            
            data.forEach(row => {
                const lat = parseFloat(row.latitude);
                const lon = parseFloat(row.longitude);
                const name = row.nom;
                const description = row.description || "Pas de description disponible.";
                const adresse = row.adresse_brut;

                if (!isNaN(lat) && !isNaN(lon)) {
                    const marker = L.marker([lat, lon]).addTo(map);
                    marker.bindPopup(`<b>${name}</b><br>${adresse}<br><br><small>${description.substring(0, 150)}...</small>`);
                }
            });
        },
        error: function(err) {
            console.error("Erreur lors du chargement du CSV :", err);
        }
    });
</script>

</body>
</html>
